    <script>
        const user = document.querySelector(".user");
        const answer = prompt("Ingrese su nombre:");
        if(answer){
            user.textContent = "Hola, " + answer + "🗣️";
        } else{
            user.textContent = "Hola, invitado 🗣️";
        }
    </script>
